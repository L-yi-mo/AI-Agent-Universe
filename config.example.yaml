# AI Agent Universe 配置文件示例
# 由 Trae IDE 整合制作
# 复制此文件为 config.yaml 并填入您的配置

# LLM 提供商配置
llm:
  default_provider: openai
  default_model: gpt-4
  
  providers:
    # OpenAI 配置
    openai:
      api_key: ${OPENAI_API_KEY}
      api_base: https://api.openai.com/v1
      models:
        - gpt-4
        - gpt-4-turbo
        - gpt-3.5-turbo
    
    # Anthropic 配置
    anthropic:
      api_key: ${ANTHROPIC_API_KEY}
      models:
        - claude-3-opus-20240229
        - claude-3-sonnet-20240229
        - claude-3-haiku-20240307
    
    # 本地模型配置 (LM Studio, Ollama 等)
    local:
      api_base: http://localhost:1234/v1
      api_key: local
      models:
        - local-model
    
    # Azure OpenAI 配置
    azure:
      api_key: ${AZURE_API_KEY}
      api_base: https://your-resource.openai.azure.com/
      api_version: "2024-02-15-preview"
      models:
        - gpt-4
        - gpt-35-turbo

# Agent 配置
agent:
  # 默认 Agent 设置
  default:
    verbose: true
    stream: true
    max_iterations: 10
  
  # 多 Agent 协作设置
  crew:
    parallel_execution: false
    process_type: sequential  # sequential, hierarchical
  
  # 任务设置
  task:
    timeout: 300  # 超时时间（秒）
    max_retries: 3

# 安全配置
security:
  # 代码执行安全
  code_execution:
    require_approval: true  # 执行前需要确认
    sandbox_enabled: true   # 启用沙箱
    timeout: 60            # 代码执行超时
    
  # 允许的命令列表
  allowed_commands:
    - python
    - pip
    - ls
    - dir
    - cat
    - type
    - echo
    - pwd
  
  # 禁止的路径
  blocked_paths:
    - /etc
    - /system32
    - /windows
    - C:\\Windows
    - C:\\Program Files
  
  # 文件操作限制
  file_operations:
    max_file_size: 10485760  # 10MB
    allowed_extensions:
      - .py
      - .txt
      - .json
      - .csv
      - .md
      - .js
      - .ts

# 工具配置
tools:
  # 文件系统和代码执行
  code_interpreter:
    enabled: true
    working_directory: ./workspace
  
  # 浏览器自动化
  browser:
    enabled: true
    headless: false
    browser_type: chromium  # chromium, firefox, webkit
  
  # GUI 自动化
  gui_control:
    enabled: true
    screenshot_enabled: true
  
  # API 调用
  api_call:
    enabled: true
    timeout: 30
    max_retries: 3

# 工作流配置
workflow:
  # 执行引擎
  engine: local  # local, celery, kubernetes
  
  # 日志记录
  logging:
    enabled: true
    level: INFO
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    file: logs/workflow.log
  
  # 检查点
  checkpoints:
    enabled: true
    interval: 1  # 每个步骤后保存

# UI 配置
ui:
  # Web 界面
  web:
    enabled: true
    host: 0.0.0.0
    port: 8000
    debug: false
  
  # 命令行界面
  cli:
    enabled: true
    theme: monokai
    show_progress: true

# 日志配置
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: logs/agent.log
  max_size: 10485760  # 10MB
  backup_count: 5

# 性能配置
performance:
  # 缓存
  cache:
    enabled: true
    type: memory  # memory, redis
    ttl: 3600
  
  # 并发
  concurrency:
    max_workers: 4
    max_async_tasks: 10

# 监控配置
monitoring:
  enabled: true
  metrics:
    - execution_time
    - token_usage
    - success_rate
    - error_rate
  
  # 告警
  alerts:
    enabled: false
    email: false
    webhook: false
